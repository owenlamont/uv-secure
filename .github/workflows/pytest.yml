name: Pytest
on:
  pull_request:
jobs:
  pytest-with-coverage:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        extra: ["none", "faster-async"]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Cache virtualenv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ matrix.extra }}-${{ hashFiles('uv.lock') }}
          restore-keys: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ matrix.extra }}-
      - name: Install the project (no extras)
        if: matrix.extra == 'none'
        run: |
          uv python pin ${{ matrix.python-version }}
          uv sync
      - name: Install the project (faster-async)
        if: matrix.extra == 'faster-async'
        run: |
          uv python pin ${{ matrix.python-version }}
          uv sync --extra faster-async
      - name: Run tests with Coverage
        run: uv run pytest -n logical --color=no tests --cov=. --cov-branch --cov-report=term-missing
      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage-${{ matrix.os }}-python-${{ matrix.python-version }}-extra-${{ matrix.extra }}
          path: .coverage
          include-hidden-files: true
  combine-and-comment:
    runs-on: ubuntu-latest
    needs: pytest-with-coverage
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - name: Install the project
        run: uv sync --all-extras
      - name: Download all coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: coverage
      - name: Combine coverage data
        run: |
          set -o pipefail
          uv run coverage combine coverage/*-python-*-extra-*/.coverage
          uv run coverage report | tee coverage_summary.txt
      - name: Compute test/src size ratio
        run: |
          uv run python scripts/size_ratio.py > ratio_summary.txt
      - name: Prepare Comment Body
        run: |
          echo '### Coverage Report' >> comment_body.md
          echo '```txt' >> comment_body.md
          cat coverage_summary.txt >> comment_body.md
          echo '' >> comment_body.md
          cat ratio_summary.txt >> comment_body.md
          echo '' >> comment_body.md
          echo '```' >> comment_body.md
      - name: Create or Update Coverage Comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --edit-last --create-if-none --body-file comment_body.md
      - name: Display Coverage Report in Logs
        run: cat comment_body.md
